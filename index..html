<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trap.NZ – 3D Map with Project Layers, Traps & Bait Stations</title>
    <!-- Mapbox GL JS + CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
    <!-- Turf.js -->
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Style selector (top right) */
        .style-selector {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: white;
            padding: 6px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        select, button {
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }
        button {
            background: #2c7a4d;
            color: white;
            border: none;
        }
        button:hover { background: #3e9c64; }
        
        /* GPS button (bottom right) */
        #gpsBtn {
            position: absolute;
            bottom: 80px;
            right: 10px;
            z-index: 10;
            background: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border: none;
        }
        
        /* Result panel (bottom left) */
        .result-panel {
            position: absolute;
            bottom: 20px;
            left: 10px;
            width: 320px;
            background: rgba(255,255,255,0.95);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
            border: 1px solid #ccc;
            max-height: 260px;
            overflow-y: auto;
        }
        .result-panel input {
            width: calc(100% - 80px);
            padding: 5px;
            margin: 5px 0;
        }
        
        /* Layer control panel (bottom right, above GPS button) */
        .layer-control {
            position: absolute;
            bottom: 140px;
            right: 10px;
            z-index: 10;
            background: rgba(255,255,255,0.95);
            border-radius: 8px;
            padding: 8px 12px;
            width: 220px;
            max-height: 50vh;
            overflow-y: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-size: 12px;
            font-family: sans-serif;
            border: 1px solid #ccc;
            pointer-events: auto;
        }
        .layer-control h4 {
            margin: 0 0 6px 0;
            font-size: 13px;
        }
        .layer-control .project-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
            gap: 6px;
        }
        .layer-control input {
            margin: 0;
            width: 16px;
            height: 16px;
        }
        .layer-control label {
            flex: 1;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .layer-control button {
            background: #2c6e9e;
            font-size: 11px;
            padding: 2px 6px;
            margin-top: 5px;
            width: 100%;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 10;
        }
        
        /* Custom tooltip - minimal, transparent background, only number */
        #customTooltip {
            position: absolute;
            background: transparent;
            color: black;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 0 2px white;
            pointer-events: none;
            z-index: 20;
            display: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div id="map"></div>

<div class="style-selector">
    <select id="styleSelect">
        <option value="light-v11">Light</option>
        <option value="streets-v12" selected>Streets</option>
        <option value="satellite-streets-v12">Satellite Streets</option>
    </select>
</div>

<div class="layer-control" id="layerControl">
    <h4>📦 Map Layers</h4>
    <div id="projectList"></div>
    <button id="toggleAllBtn">Toggle All Projects</button>
    <hr style="margin: 8px 0;">
    <div class="project-item">
        <input type="checkbox" id="toggleTraps">   <!-- OFF by default -->
        <label for="toggleTraps">🔴 Traps</label>
    </div>
    <div class="project-item">
        <input type="checkbox" id="toggleBaitStations">   <!-- OFF by default -->
        <label for="toggleBaitStations">🔵 Bait Stations</label>
    </div>
</div>

<button id="gpsBtn">📍</button>

<div class="result-panel">
    <div><strong>📍 Find location</strong></div>
    <input type="text" id="addressInput" placeholder="Address, e.g., 21 Hunter Rd, Patumahoe" value="21 Hunter Rd, Patumahoe, New Zealand">
    <button id="geocodeBtn">Geocode</button>
    <button id="findBtn">📋 Find projects at marker</button>
    <button id="refreshBtn">🔄 Reload All Data</button>
    <div id="resultText" style="margin-top: 8px; font-size: 12px;">💡 3D buildings: tilt map (right-click + drag). Hover over traps or bait stations to see days since last reset.</div>
</div>
<div class="legend">🏢 3D buildings | 🟦 Polygons = Projects | 🔴 Red = Traps | 🔵 Blue = Bait Stations</div>

<div id="customTooltip"></div>

<script>
    // ========== CONFIGURATION ==========
    const MAPBOX_TOKEN = 'pk.eyJ1Ijoia2FyYWthcG9pbnQiLCJhIjoiY2xyeXRiOGJ2MTlvdDJqbzJ4ZHYyMXFvciJ9.o07GiRleYanbHHDEc9PAWg';
    const TRAPNZ_API_KEY = 'qDnc6auGUvKJMX1NPVqJZgjHZNE5b_NDaJYoTqmz_Jg';
    const ALL_PROJECTS_ID = '0';

    let map;
    let marker;
    let allProjectsGeoJSON = null;
    let currentStyle = 'streets-v12';
    let isStyleLoading = false;
    
    // Project layers
    let projectLayers = [];
    // Feature layers
    let trapsData = null;
    let baitStationsData = null;
    let trapRecords = [];
    let baitStationRecords = [];
    let trapsLayerId = 'traps-layer';
    let baitStationsLayerId = 'bait-stations-layer';
    
    // Custom tooltip element
    const tooltip = document.getElementById('customTooltip');
    
    // ---------- Helpers ----------
    function setResultText(html, isError = false) {
        const div = document.getElementById('resultText');
        if (isError) div.innerHTML = `⚠️ ${html}`;
        else div.innerHTML = html;
    }
    
    // ---------- 3D Buildings ----------
    function add3DBuildings() {
        if (!map.isStyleLoaded()) {
            map.once('styledata', add3DBuildings);
            return;
        }
        if (map.getLayer('3d-buildings')) map.removeLayer('3d-buildings');
        if (map.getSource('building-source')) map.removeSource('building-source');
        map.addSource('building-source', {
            type: 'vector',
            url: 'mapbox://mapbox.mapbox-streets-v8'
        });
        map.addLayer({
            id: '3d-buildings',
            type: 'fill-extrusion',
            source: 'building-source',
            'source-layer': 'building',
            paint: {
                'fill-extrusion-color': '#c0c0c0',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.9
            }
        });
    }
    
    // ---------- Map init ----------
    mapboxgl.accessToken = MAPBOX_TOKEN;
    map = new mapboxgl.Map({
        container: 'map',
        style: `mapbox://styles/mapbox/${currentStyle}`,
        center: [174.7982411, -37.1397649],
        zoom: 15,
        pitch: 60,
        bearing: 0
    });
    map.addControl(new mapboxgl.NavigationControl());
    map.addControl(new mapboxgl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true
    }));
    
    // Marker
    marker = new mapboxgl.Marker({ draggable: true })
        .setLngLat([174.7982411, -37.1397649])
        .addTo(map);
    marker.on('dragend', () => setResultText('Marker moved. Press "Find projects".'));
    map.on('click', (e) => {
        marker.setLngLat(e.lngLat);
        setResultText(`Marker at (${e.lngLat.lat.toFixed(5)}, ${e.lngLat.lng.toFixed(5)})`);
    });
    
    // GPS button
    document.getElementById('gpsBtn').onclick = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                marker.setLngLat([longitude, latitude]);
                map.flyTo({ center: [longitude, latitude], zoom: 16 });
                setResultText('GPS: marker moved');
            }, err => setResultText(`GPS error: ${err.message}`, true));
        } else {
            setResultText('Geolocation not supported', true);
        }
    };
    
    // ---------- Style switcher ----------
    document.getElementById('styleSelect').addEventListener('change', async (e) => {
        if (isStyleLoading) return;
        isStyleLoading = true;
        const newStyle = `mapbox://styles/mapbox/${e.target.value}`;
        const center = map.getCenter();
        const zoom = map.getZoom();
        const pitch = map.getPitch();
        const bearing = map.getBearing();
        map.setStyle(newStyle);
        map.once('style.load', () => {
            map.setCenter(center);
            map.setZoom(zoom);
            map.setPitch(pitch);
            map.setBearing(bearing);
            add3DBuildings();
            if (allProjectsGeoJSON) addProjectPolygons(allProjectsGeoJSON);
            if (trapsData) addTrapsLayer();
            if (baitStationsData) addBaitStationsLayer();
            isStyleLoading = false;
        });
    });
    
    // ---------- Project layer control UI ----------
    function rebuildLayerControl() {
        const container = document.getElementById('projectList');
        if (!container) return;
        if (projectLayers.length === 0) {
            container.innerHTML = '<div style="color:#999;">No projects loaded</div>';
            return;
        }
        let html = '';
        projectLayers.forEach((p, idx) => {
            html += `
                <div class="project-item">
                    <input type="checkbox" id="chk_${idx}" ${p.visible ? 'checked' : ''} data-idx="${idx}">
                    <label for="chk_${idx}" title="${escapeHtml(p.name)}">${escapeHtml(p.name.length > 25 ? p.name.slice(0,22)+'...' : p.name)}</label>
                </div>
            `;
        });
        container.innerHTML = html;
        document.querySelectorAll('#projectList input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const idx = parseInt(e.target.getAttribute('data-idx'));
                if (!isNaN(idx)) toggleProjectLayer(idx, e.target.checked);
            });
        });
    }
    
    function toggleProjectLayer(idx, visible) {
        const proj = projectLayers[idx];
        if (!proj) return;
        proj.visible = visible;
        const visibility = visible ? 'visible' : 'none';
        if (map.getLayer(proj.fillId)) map.setLayoutProperty(proj.fillId, 'visibility', visibility);
        if (map.getLayer(proj.lineId)) map.setLayoutProperty(proj.lineId, 'visibility', visibility);
        if (proj.labelId && map.getLayer(proj.labelId)) map.setLayoutProperty(proj.labelId, 'visibility', visibility);
    }
    
    function toggleAllLayers(visible) {
        projectLayers.forEach((_, idx) => {
            const cb = document.getElementById(`chk_${idx}`);
            if (cb) cb.checked = visible;
            toggleProjectLayer(idx, visible);
        });
    }
    
    // ---------- Project polygons ----------
    function clearProjectLayers() {
        projectLayers.forEach(p => {
            if (map.getLayer(p.fillId)) map.removeLayer(p.fillId);
            if (map.getLayer(p.lineId)) map.removeLayer(p.lineId);
            if (p.labelId && map.getLayer(p.labelId)) map.removeLayer(p.labelId);
            if (map.getSource(p.sourceId)) map.removeSource(p.sourceId);
            if (p.labelSourceId && map.getSource(p.labelSourceId)) map.removeSource(p.labelSourceId);
        });
        projectLayers = [];
    }
    
    function getColorForProject(projectId) {
        const idStr = String(projectId);
        let hash = 0;
        for (let i = 0; i < idStr.length; i++) hash = ((hash << 5) - hash) + idStr.charCodeAt(i);
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 65%, 55%)`;
    }
    
    function addProjectPolygons(geojson) {
        if (!geojson || !geojson.features) return;
        clearProjectLayers();
        
        geojson.features.forEach((feature, idx) => {
            const geom = feature.geometry;
            if (!geom) return;
            const props = feature.properties;
            let projectName = props.project_name || props.name || props.projectname || props.title || 'Unnamed project';
            let rawId = props.project_id || props.id || `unknown_${idx}`;
            const projectId = String(rawId);
            const color = getColorForProject(projectId);
            const safeId = projectId.replace(/\D/g, '') || idx;
            const baseId = `proj_${idx}_${safeId}`;
            const fillId = `${baseId}_fill`;
            const lineId = `${baseId}_line`;
            const labelId = `${baseId}_label`;
            const srcId = `${baseId}_source`;
            const labelSrcId = `${baseId}_label_source`;
            
            map.addSource(srcId, { type: 'geojson', data: feature });
            map.addLayer({
                id: fillId,
                type: 'fill',
                source: srcId,
                paint: { 'fill-color': color, 'fill-opacity': 0.4 }
            });
            map.addLayer({
                id: lineId,
                type: 'line',
                source: srcId,
                paint: { 'line-color': color, 'line-width': 2 }
            });
            
            // Label at centroid
            let actualLabelId = null;
            let actualLabelSourceId = null;
            try {
                let centroid;
                if (geom.type === 'Polygon') centroid = turf.centroid(turf.polygon(geom.coordinates));
                else if (geom.type === 'MultiPolygon') centroid = turf.centroid(turf.multiPolygon(geom.coordinates));
                if (centroid) {
                    const [lng, lat] = centroid.geometry.coordinates;
                    const labelPoint = {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [lng, lat] },
                        properties: { name: projectName }
                    };
                    map.addSource(labelSrcId, { type: 'geojson', data: labelPoint });
                    map.addLayer({
                        id: labelId,
                        type: 'symbol',
                        source: labelSrcId,
                        layout: {
                            'text-field': projectName,
                            'text-font': ['DIN Offc Pro Bold', 'Arial Unicode MS Bold'],
                            'text-size': 14,
                            'text-offset': [0, -0.6],
                            'text-allow-overlap': false,
                            'text-ignore-placement': false
                        },
                        paint: {
                            'text-color': '#000',
                            'text-halo-color': 'white',
                            'text-halo-width': 2
                        }
                    });
                    actualLabelId = labelId;
                    actualLabelSourceId = labelSrcId;
                }
            } catch(e) { console.warn(`label failed for ${projectName}`, e); }
            
            projectLayers.push({
                id: projectId,
                name: projectName,
                fillId: fillId,
                lineId: lineId,
                labelId: actualLabelId,
                sourceId: srcId,
                labelSourceId: actualLabelSourceId,
                visible: true
            });
        });
        
        // Popup on polygon click
        map.on('click', (e) => {
            const fillIds = projectLayers.map(p => p.fillId);
            const features = map.queryRenderedFeatures(e.point, { layers: fillIds });
            if (features.length) {
                const src = features[0].source;
                const srcData = map.getSource(src);
                if (srcData && srcData._data) {
                    const props = srcData._data.properties || {};
                    const pName = props.project_name || props.name || props.projectname || 'Unnamed';
                    const pId = props.project_id || props.id || 'unknown';
                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`<b>${escapeHtml(pName)}</b><br>ID: ${pId}`)
                        .addTo(map);
                }
            }
        });
        
        rebuildLayerControl();
        setResultText(`✅ Loaded ${geojson.features.length} project(s). Use checkboxes to toggle layers.`);
    }
    
    // ---------- Fetch projects ----------
    let isLoadingProjects = false;
    async function fetchAllProjects() {
        if (isLoadingProjects) return;
        isLoadingProjects = true;
        document.getElementById('refreshBtn').disabled = true;
        setResultText('📡 Fetching project boundaries...');
        const url = `https://io.trap.nz/geo/trapnz-projects/wfs/${TRAPNZ_API_KEY}/${ALL_PROJECTS_ID}?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature&TYPENAMES=trapnz-projects:my-projects&OUTPUTFORMAT=application/json`;
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const geojson = await resp.json();
            if (!geojson.features || geojson.features.length === 0) throw new Error('No projects found.');
            allProjectsGeoJSON = geojson;
            addProjectPolygons(allProjectsGeoJSON);
        } catch (err) {
            setResultText(`Error: ${err.message}`, true);
        } finally {
            isLoadingProjects = false;
            document.getElementById('refreshBtn').disabled = false;
        }
    }
    
    // ---------- Fetch traps, bait stations, and records ----------
    async function fetchTraps() {
        try {
            const url = `https://io.trap.nz/geo/trapnz-projects/wfs/${TRAPNZ_API_KEY}/${ALL_PROJECTS_ID}?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature&TYPENAMES=trapnz-projects:my-projects-traps&OUTPUTFORMAT=application/json`;
            const resp = await fetch(url);
            if (resp.ok) {
                const geojson = await resp.json();
                if (geojson.features && geojson.features.length > 0) {
                    trapsData = geojson;
                }
            } else {
                console.warn('Failed to fetch traps:', resp.status);
            }
        } catch (err) {
            console.error('Error fetching traps:', err);
        }
    }
    
    async function fetchBaitStations() {
        try {
            const url = `https://io.trap.nz/geo/trapnz-projects/wfs/${TRAPNZ_API_KEY}/${ALL_PROJECTS_ID}?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature&TYPENAMES=trapnz-projects:my-projects-bait-stations&OUTPUTFORMAT=application/json`;
            const resp = await fetch(url);
            if (resp.ok) {
                const geojson = await resp.json();
                if (geojson.features && geojson.features.length > 0) {
                    baitStationsData = geojson;
                }
            } else {
                console.warn('Failed to fetch bait stations:', resp.status);
            }
        } catch (err) {
            console.error('Error fetching bait stations:', err);
        }
    }
    
    async function fetchTrapRecords() {
        try {
            const url = `https://io.trap.nz/geo/trapnz-projects/wfs/${TRAPNZ_API_KEY}/${ALL_PROJECTS_ID}?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature&TYPENAMES=trapnz-projects:my-projects-trap-records&OUTPUTFORMAT=application/json`;
            const resp = await fetch(url);
            if (resp.ok) {
                const data = await resp.json();
                if (data.features) trapRecords = data.features;
            } else {
                console.warn('Failed to fetch trap records:', resp.status);
            }
        } catch (err) {
            console.error('Error fetching trap records:', err);
        }
    }
    
    async function fetchBaitStationRecords() {
        try {
            const url = `https://io.trap.nz/geo/trapnz-projects/wfs/${TRAPNZ_API_KEY}/${ALL_PROJECTS_ID}?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature&TYPENAMES=trapnz-projects:my-projects-bait-station-records&OUTPUTFORMAT=application/json`;
            const resp = await fetch(url);
            if (resp.ok) {
                const data = await resp.json();
                if (data.features) baitStationRecords = data.features;
            } else {
                console.warn('Failed to fetch bait station records:', resp.status);
            }
        } catch (err) {
            console.error('Error fetching bait station records:', err);
        }
    }
    
    // ---------- Days since last reset ----------
    function getDaysSinceLastReset(installationId, records, recordDateField = 'record_date') {
        const recordsForInstallation = records.filter(rec => {
            const props = rec.properties;
            return props.trap_id === installationId || props.trap_code === installationId || 
                   props.station_id === installationId || props.code === installationId;
        });
        if (recordsForInstallation.length === 0) return null;
        let latestDate = null;
        for (const rec of recordsForInstallation) {
            const dateStr = rec.properties[recordDateField] || rec.properties.date || rec.properties.created_at;
            if (dateStr) {
                const date = new Date(dateStr);
                if (!latestDate || date > latestDate) latestDate = date;
            }
        }
        if (!latestDate) return null;
        const today = new Date();
        const diffDays = Math.floor((today - latestDate) / (1000 * 60 * 60 * 24));
        return diffDays;
    }
    
    function prepareTrapsWithStatus() {
        if (!trapsData || !trapsData.features) return null;
        const featuresWithDays = [];
        for (const feature of trapsData.features) {
            const props = feature.properties;
            const trapId = props.trap_id || props.id || props.code;
            const daysSince = getDaysSinceLastReset(trapId, trapRecords, 'record_date');
            const newFeature = JSON.parse(JSON.stringify(feature));
            newFeature.properties.days_since_reset = daysSince;
            featuresWithDays.push(newFeature);
        }
        return { type: 'FeatureCollection', features: featuresWithDays };
    }
    
    function prepareBaitStationsWithStatus() {
        if (!baitStationsData || !baitStationsData.features) return null;
        const featuresWithDays = [];
        for (const feature of baitStationsData.features) {
            const props = feature.properties;
            const stationId = props.bait_station_id || props.id || props.code;
            const daysSince = getDaysSinceLastReset(stationId, baitStationRecords, 'record_date');
            const newFeature = JSON.parse(JSON.stringify(feature));
            newFeature.properties.days_since_reset = daysSince;
            featuresWithDays.push(newFeature);
        }
        return { type: 'FeatureCollection', features: featuresWithDays };
    }
    
    // ---------- Add layers with visibility set by checkbox ----------
    function addTrapsLayer() {
        if (map.getLayer(trapsLayerId)) map.removeLayer(trapsLayerId);
        if (map.getSource(trapsLayerId)) map.removeSource(trapsLayerId);
        
        const trapsWithStatus = prepareTrapsWithStatus();
        if (!trapsWithStatus || trapsWithStatus.features.length === 0) return;
        
        map.addSource(trapsLayerId, { type: 'geojson', data: trapsWithStatus });
        // Read initial state from checkbox
        const trapsCheckbox = document.getElementById('toggleTraps');
        const initialVisible = trapsCheckbox ? trapsCheckbox.checked : false;
        map.addLayer({
            id: trapsLayerId,
            type: 'circle',
            source: trapsLayerId,
            layout: { visibility: initialVisible ? 'visible' : 'none' },
            paint: {
                'circle-radius': 4,
                'circle-color': '#ff0000',
                'circle-stroke-width': 0.5,
                'circle-stroke-color': '#ffffff'
            }
        });
        
        // Custom tooltip (only number)
        map.on('mousemove', trapsLayerId, (e) => {
            if (e.features.length > 0) {
                const props = e.features[0].properties;
                const days = props.days_since_reset;
                const display = (days !== null && days !== undefined && days >= 0) ? days : '?';
                tooltip.style.display = 'block';
                tooltip.innerHTML = display;
                tooltip.style.left = (e.point.x + 10) + 'px';
                tooltip.style.top = (e.point.y - 15) + 'px';
            } else {
                tooltip.style.display = 'none';
            }
        });
    }
    
    function addBaitStationsLayer() {
        if (map.getLayer(baitStationsLayerId)) map.removeLayer(baitStationsLayerId);
        if (map.getSource(baitStationsLayerId)) map.removeSource(baitStationsLayerId);
        
        const baitStationsWithStatus = prepareBaitStationsWithStatus();
        if (!baitStationsWithStatus || baitStationsWithStatus.features.length === 0) return;
        
        map.addSource(baitStationsLayerId, { type: 'geojson', data: baitStationsWithStatus });
        // Read initial state from checkbox
        const bsCheckbox = document.getElementById('toggleBaitStations');
        const initialVisible = bsCheckbox ? bsCheckbox.checked : false;
        map.addLayer({
            id: baitStationsLayerId,
            type: 'circle',
            source: baitStationsLayerId,
            layout: { visibility: initialVisible ? 'visible' : 'none' },
            paint: {
                'circle-radius': 4,
                'circle-color': '#0000ff',
                'circle-stroke-width': 0.5,
                'circle-stroke-color': '#ffffff'
            }
        });
        
        // Custom tooltip
        map.on('mousemove', baitStationsLayerId, (e) => {
            if (e.features.length > 0) {
                const props = e.features[0].properties;
                const days = props.days_since_reset;
                const display = (days !== null && days !== undefined && days >= 0) ? days : '?';
                tooltip.style.display = 'block';
                tooltip.innerHTML = display;
                tooltip.style.left = (e.point.x + 10) + 'px';
                tooltip.style.top = (e.point.y - 15) + 'px';
            } else {
                tooltip.style.display = 'none';
            }
        });
    }
    
    function toggleTrapsLayer() {
        const visibility = document.getElementById('toggleTraps').checked ? 'visible' : 'none';
        if (map.getLayer(trapsLayerId)) map.setLayoutProperty(trapsLayerId, 'visibility', visibility);
    }
    
    function toggleBaitStationsLayer() {
        const visibility = document.getElementById('toggleBaitStations').checked ? 'visible' : 'none';
        if (map.getLayer(baitStationsLayerId)) map.setLayoutProperty(baitStationsLayerId, 'visibility', visibility);
    }
    
    // Hide tooltip when map moves or mouse leaves map
    map.on('move', () => { tooltip.style.display = 'none'; });
    map.getCanvas().addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    
    // ---------- Fetch all data ----------
    async function fetchAllData() {
        setResultText('📡 Fetching all data (projects, traps, bait stations)...');
        await Promise.all([
            fetchAllProjects(),
            fetchTraps(),
            fetchBaitStations(),
            fetchTrapRecords(),
            fetchBaitStationRecords()
        ]);
        if (trapsData) addTrapsLayer();
        if (baitStationsData) addBaitStationsLayer();
        setResultText('✅ All data loaded. Hover over red/blue dots to see days since reset.');
    }
    
    // ---------- Point-in-polygon ----------
    function findContainingProjectsSorted(pointLngLat, geojson) {
        const point = turf.point(pointLngLat);
        const matches = [];
        for (const feat of geojson.features) {
            const geom = feat.geometry;
            if (!geom) continue;
            let contains = false;
            if (geom.type === 'Polygon') contains = turf.booleanPointInPolygon(point, turf.polygon(geom.coordinates));
            else if (geom.type === 'MultiPolygon') contains = turf.booleanPointInPolygon(point, turf.multiPolygon(geom.coordinates));
            if (contains) {
                let area = 0;
                if (geom.type === 'Polygon') area = turf.area(turf.polygon(geom.coordinates));
                else if (geom.type === 'MultiPolygon') area = turf.area(turf.multiPolygon(geom.coordinates));
                matches.push({ feature: feat, area });
            }
        }
        matches.sort((a,b) => a.area - b.area);
        return matches.map(m => m.feature);
    }
    
    async function findProjectsAtMarker() {
        if (!allProjectsGeoJSON) {
            setResultText('No project data. Click "Reload All Data".', true);
            return;
        }
        const lngLat = marker.getLngLat();
        const lng = lngLat.lng, lat = lngLat.lat;
        setResultText(`🔍 Checking (${lat.toFixed(5)}, ${lng.toFixed(5)}) ...`);
        const containing = findContainingProjectsSorted([lng, lat], allProjectsGeoJSON);
        if (containing.length === 0) {
            setResultText(`📍 No project contains this point.`);
            return;
        }
        let html = `<strong>${containing.length} containing project(s) – smallest first:</strong><br><ol>`;
        for (const feat of containing) {
            const props = feat.properties;
            const pName = props.project_name || props.name || props.projectname || props.title || 'Unnamed';
            const pId = props.project_id || props.id || 'unknown';
            html += `<li><b>${escapeHtml(pName)}</b> (ID: ${pId})</li>`;
        }
        html += `</ol><span style="font-size:10px;">💡 First = most local (smallest area).</span>`;
        setResultText(html);
    }
    
    // ---------- Geocoding ----------
    async function geocodeAddress(address) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`;
        const resp = await fetch(url, { headers: { 'User-Agent': 'TrapNZ-Mapbox/1.0' } });
        const data = await resp.json();
        if (!data.length) throw new Error('Address not found.');
        const { lat, lon, display_name } = data[0];
        return { lat: parseFloat(lat), lng: parseFloat(lon), displayName: display_name };
    }
    
    async function onGeocode() {
        const addr = document.getElementById('addressInput').value.trim();
        if (!addr) { setResultText('Enter address.', true); return; }
        setResultText('🌍 Geocoding...');
        try {
            const { lat, lng, displayName } = await geocodeAddress(addr);
            marker.setLngLat([lng, lat]);
            map.flyTo({ center: [lng, lat], zoom: 15, pitch: 60 });
            setResultText(`📍 ${displayName}`);
        } catch (err) {
            setResultText(`Geocoding failed: ${err.message}`, true);
        }
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
    }
    
    // ---------- Event binding ----------
    document.getElementById('geocodeBtn').onclick = onGeocode;
    document.getElementById('findBtn').onclick = findProjectsAtMarker;
    document.getElementById('refreshBtn').onclick = fetchAllData;
    document.getElementById('toggleAllBtn').onclick = () => {
        const someVisible = projectLayers.some(p => p.visible);
        toggleAllLayers(!someVisible);
    };
    document.getElementById('toggleTraps').onchange = toggleTrapsLayer;
    document.getElementById('toggleBaitStations').onchange = toggleBaitStationsLayer;
    document.getElementById('addressInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') onGeocode(); });
    
    // ---------- Start ----------
    map.on('load', () => {
        add3DBuildings();
        fetchAllData();
        setTimeout(() => {
            const defaultAddr = document.getElementById('addressInput').value;
            if (defaultAddr) {
                geocodeAddress(defaultAddr).then(({ lat, lng }) => {
                    marker.setLngLat([lng, lat]);
                    map.flyTo({ center: [lng, lat], zoom: 14 });
                    setResultText(`Demo marker at "${defaultAddr}". Hover over red/blue dots for days since reset.`);
                }).catch(console.warn);
            }
        }, 2000);
    });
</script>

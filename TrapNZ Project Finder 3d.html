<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trap.NZ – 3D Project Map (fully working)</title>
    <!-- Mapbox GL JS + CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
    <!-- Turf.js for geometry & area -->
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Top right style selector */
        .style-selector {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: white;
            padding: 6px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            font-family: sans-serif;
        }
        select, button {
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }
        button {
            background: #2c7a4d;
            color: white;
            border: none;
        }
        button:hover { background: #3e9c64; }
        
        /* GPS button */
        #gpsBtn {
            position: absolute;
            bottom: 80px;
            right: 10px;
            z-index: 10;
            background: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border: none;
        }
        
        /* Result panel (bottom left) */
        .result-panel {
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            max-width: 400px;
            background: rgba(255,255,255,0.95);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            font-family: sans-serif;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
            border: 1px solid #ccc;
            pointer-events: auto;
            max-height: 200px;
            overflow-y: auto;
        }
        .result-panel input {
            width: calc(100% - 80px);
            padding: 5px;
            margin: 5px 0;
        }
        .result-panel button {
            margin: 2px;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 10;
        }
    </style>
</head>
<body>
<div id="map"></div>

<div class="style-selector">
    <select id="styleSelect">
        <option value="light-v11">Light</option>
        <option value="streets-v12" selected>Streets</option>
        <option value="satellite-streets-v12">Satellite Streets</option>
    </select>
</div>

<button id="gpsBtn">📍</button>

<div class="result-panel" id="resultPanel">
    <div><strong>📍 Find your location</strong></div>
    <input type="text" id="addressInput" placeholder="Address, e.g., 21 Hunter Rd, Patumahoe" value="21 Hunter Rd, Patumahoe, New Zealand">
    <button id="geocodeBtn">Geocode</button>
    <button id="findBtn">📋 Find projects at marker</button>
    <button id="refreshBtn">🔄 Reload projects</button>
    <div id="resultText" style="margin-top: 8px; font-size: 12px;">💡 Click map or geocode → move marker → press "Find projects"</div>
</div>
<div class="legend">🏢 3D buildings active | 🟦 Colored polygons = your Trap.NZ projects</div>

<script>
    // ========== CONFIGURATION (YOUR KEYS) ==========
    const MAPBOX_TOKEN = 'pk.eyJ1Ijoia2FyYWthcG9pbnQiLCJhIjoiY2xyeXRiOGJ2MTlvdDJqbzJ4ZHYyMXFvciJ9.o07GiRleYanbHHDEc9PAWg';
    const TRAPNZ_API_KEY = 'qDnc6auGUvKJMX1NPVqJZgjHZNE5b_NDaJYoTqmz_Jg';
    const ALL_PROJECTS_ID = '0';   // 0 = all accessible projects
    
    // Global variables
    let map;
    let marker;
    let allProjectsGeoJSON = null;
    let currentStyle = 'streets-v12';
    let isStyleLoading = false;
    let projectPolygonIds = [];
    let projectLabelIds = [];
    
    // ---------- Helper: update result text ----------
    function setResultText(html, isError = false) {
        const div = document.getElementById('resultText');
        if (isError) div.innerHTML = `⚠️ ${html}`;
        else div.innerHTML = html;
    }
    
    // ---------- Initialize Map ----------
    mapboxgl.accessToken = MAPBOX_TOKEN;
    map = new mapboxgl.Map({
        container: 'map',
        style: `mapbox://styles/mapbox/${currentStyle}`,
        center: [174.7982411, -37.1397649], // Pukekohe area
        zoom: 13,
        pitch: 60,    // tilt for 3D effect
        bearing: 0
    });
    
    // Add navigation and geolocate controls
    map.addControl(new mapboxgl.NavigationControl());
    map.addControl(new mapboxgl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true
    }));
    
    // Draggable marker
    marker = new mapboxgl.Marker({ draggable: true })
        .setLngLat([174.7982411, -37.1397649])
        .addTo(map);
    marker.on('dragend', () => setResultText('Marker moved. Press "Find projects".'));
    
    // Click on map to move marker
    map.on('click', (e) => {
        marker.setLngLat(e.lngLat);
        setResultText(`Marker placed at (${e.lngLat.lat.toFixed(5)}, ${e.lngLat.lng.toFixed(5)})`);
    });
    
    // GPS button
    document.getElementById('gpsBtn').onclick = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                marker.setLngLat([longitude, latitude]);
                map.flyTo({ center: [longitude, latitude], zoom: 16 });
                setResultText(`GPS: moved marker to your location.`);
            }, err => setResultText(`GPS error: ${err.message}`, true));
        } else {
            setResultText('Geolocation not supported', true);
        }
    };
    
    // ---------- 3D Buildings (works on any style) ----------
    function enable3DBuildings() {
        if (!map.isStyleLoaded()) {
            map.once('styledata', enable3DBuildings);
            return;
        }
        // Remove old layers/sources to avoid conflicts
        if (map.getLayer('3d-buildings')) map.removeLayer('3d-buildings');
        if (map.getSource('composite')) map.removeSource('composite');
        
        // Add vector source and extrusion layer
        map.addSource('composite', {
            type: 'vector',
            url: 'mapbox://mapbox.mapbox-streets-v8'
        });
        map.addLayer({
            id: '3d-buildings',
            type: 'fill-extrusion',
            source: 'composite',
            'source-layer': 'building',
            paint: {
                'fill-extrusion-color': '#aaa',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.8
            }
        }, 'road-label'); // place below road labels
    }
    
    // ---------- Style Switcher ----------
    document.getElementById('styleSelect').addEventListener('change', async (e) => {
        if (isStyleLoading) return;
        isStyleLoading = true;
        const newStyle = `mapbox://styles/mapbox/${e.target.value}`;
        const center = map.getCenter();
        const zoom = map.getZoom();
        const pitch = map.getPitch();
        const bearing = map.getBearing();
        
        map.setStyle(newStyle);
        map.once('style.load', () => {
            map.setCenter(center);
            map.setZoom(zoom);
            map.setPitch(pitch);
            map.setBearing(bearing);
            enable3DBuildings();          // re-enable 3D
            if (allProjectsGeoJSON) {
                addProjectPolygons(allProjectsGeoJSON);
            }
            isStyleLoading = false;
        });
    });
    
    // ---------- Project Polygon & Label Management ----------
    function getColorForProject(projectId) {
        let hash = 0;
        for (let i = 0; i < projectId.length; i++) hash = ((hash << 5) - hash) + projectId.charCodeAt(i);
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 65%, 55%)`;
    }
    
    function clearProjectLayers() {
        projectPolygonIds.forEach(id => {
            if (map.getLayer(id)) map.removeLayer(id);
            if (map.getSource(id)) map.removeSource(id);
        });
        projectLabelIds.forEach(id => {
            if (map.getLayer(id)) map.removeLayer(id);
            if (map.getSource(id)) map.removeSource(id);
        });
        projectPolygonIds = [];
        projectLabelIds = [];
    }
    
    function addProjectPolygons(geojson) {
        if (!geojson || !geojson.features) return;
        clearProjectLayers();
        
        geojson.features.forEach((feature, idx) => {
            const geom = feature.geometry;
            if (!geom) return;
            const props = feature.properties;
            // Extract project name correctly
            let projectName = props.project_name || props.name || props.projectname || props.title || 'Unnamed project';
            const projectId = props.project_id || props.id || 'unknown';
            const color = getColorForProject(projectId);
            const srcId = `proj_${idx}`;
            const fillId = `fill_${idx}`;
            const lineId = `line_${idx}`;
            const labelId = `label_${idx}`;
            
            // Add polygon source and layers
            map.addSource(srcId, { type: 'geojson', data: feature });
            map.addLayer({
                id: fillId,
                type: 'fill',
                source: srcId,
                paint: { 'fill-color': color, 'fill-opacity': 0.4 }
            });
            map.addLayer({
                id: lineId,
                type: 'line',
                source: srcId,
                paint: { 'line-color': color, 'line-width': 2 }
            });
            projectPolygonIds.push(fillId, lineId);
            
            // Add large text label at centroid
            try {
                let centroid;
                if (geom.type === 'Polygon') centroid = turf.centroid(turf.polygon(geom.coordinates));
                else if (geom.type === 'MultiPolygon') centroid = turf.centroid(turf.multiPolygon(geom.coordinates));
                if (centroid) {
                    const [lng, lat] = centroid.geometry.coordinates;
                    const labelPoint = {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [lng, lat] },
                        properties: { name: projectName }
                    };
                    map.addSource(labelId, { type: 'geojson', data: labelPoint });
                    map.addLayer({
                        id: labelId,
                        type: 'symbol',
                        source: labelId,
                        layout: {
                            'text-field': projectName,
                            'text-font': ['DIN Offc Pro Bold', 'Arial Unicode MS Bold'],
                            'text-size': 14,      // large, readable
                            'text-offset': [0, -0.6],
                            'text-allow-overlap': false,
                            'text-ignore-placement': false
                        },
                        paint: {
                            'text-color': '#000',
                            'text-halo-color': 'white',
                            'text-halo-width': 2
                        }
                    });
                    projectLabelIds.push(labelId);
                }
            } catch(e) { console.warn(`Label failed for ${projectName}`, e); }
        });
        
        // Popup on polygon click
        map.on('click', (e) => {
            const features = map.queryRenderedFeatures(e.point, { layers: projectPolygonIds });
            if (features.length) {
                const src = features[0].source;
                const srcData = map.getSource(src);
                if (srcData && srcData._data) {
                    const props = srcData._data.properties || {};
                    const pName = props.project_name || props.name || props.projectname || 'Unnamed';
                    const pId = props.project_id || props.id || 'unknown';
                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`<b>${escapeHtml(pName)}</b><br>ID: ${pId}`)
                        .addTo(map);
                }
            }
        });
        setResultText(`✅ Loaded ${geojson.features.length} project(s) with labels. Click a polygon for details.`);
    }
    
    // ---------- Fetch all projects from Trap.NZ ----------
    let isLoadingProjects = false;
    async function fetchAllProjects() {
        if (isLoadingProjects) return;
        isLoadingProjects = true;
        const refreshBtn = document.getElementById('refreshBtn');
        refreshBtn.disabled = true;
        setResultText('📡 Fetching project boundaries from Trap.NZ...');
        const url = `https://io.trap.nz/geo/trapnz-projects/wfs/${TRAPNZ_API_KEY}/${ALL_PROJECTS_ID}?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature&TYPENAMES=trapnz-projects:my-projects&OUTPUTFORMAT=application/json`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            const geojson = await response.json();
            if (!geojson.features || geojson.features.length === 0) {
                throw new Error('No projects found. Check API key and "Share summary data".');
            }
            allProjectsGeoJSON = geojson;
            addProjectPolygons(allProjectsGeoJSON);
        } catch (err) {
            setResultText(`Error: ${err.message}`, true);
        } finally {
            isLoadingProjects = false;
            refreshBtn.disabled = false;
        }
    }
    
    // ---------- Find ALL projects containing marker, sorted by area (smallest first) ----------
    function findContainingProjectsSorted(pointLngLat, geojson) {
        const point = turf.point(pointLngLat);
        const matches = [];
        for (const feat of geojson.features) {
            const geom = feat.geometry;
            if (!geom) continue;
            let contains = false;
            if (geom.type === 'Polygon') {
                const poly = turf.polygon(geom.coordinates);
                contains = turf.booleanPointInPolygon(point, poly);
            } else if (geom.type === 'MultiPolygon') {
                const mpoly = turf.multiPolygon(geom.coordinates);
                contains = turf.booleanPointInPolygon(point, mpoly);
            }
            if (contains) {
                let area = 0;
                if (geom.type === 'Polygon') area = turf.area(turf.polygon(geom.coordinates));
                else if (geom.type === 'MultiPolygon') area = turf.area(turf.multiPolygon(geom.coordinates));
                matches.push({ feature: feat, area });
            }
        }
        matches.sort((a,b) => a.area - b.area);
        return matches.map(m => m.feature);
    }
    
    async function findProjectsAtMarker() {
        if (!allProjectsGeoJSON) {
            setResultText('No project data loaded. Click "Reload projects" first.', true);
            return;
        }
        const lngLat = marker.getLngLat();
        const lng = lngLat.lng;
        const lat = lngLat.lat;
        setResultText(`🔍 Checking (${lat.toFixed(5)}, ${lng.toFixed(5)}) ...`);
        const containing = findContainingProjectsSorted([lng, lat], allProjectsGeoJSON);
        if (containing.length === 0) {
            setResultText(`📍 No project contains this point.`);
            return;
        }
        let html = `<strong>${containing.length} containing project(s) – smallest area first (most specific):</strong><br><ol>`;
        for (const feat of containing) {
            const props = feat.properties;
            const pName = props.project_name || props.name || props.projectname || props.title || 'Unnamed';
            const pId = props.project_id || props.id || 'unknown';
            html += `<li><b>${escapeHtml(pName)}</b> (ID: ${pId})</li>`;
        }
        html += `</ol><span style="font-size: 10px;">💡 First = most local (smallest area).</span>`;
        setResultText(html);
    }
    
    // ---------- Geocoding (Nominatim) ----------
    async function geocodeAddress(address) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`;
        const response = await fetch(url, {
            headers: { 'User-Agent': 'TrapNZ-Mapbox/1.0' }
        });
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('Address not found.');
        const { lat, lon, display_name } = data[0];
        return { lat: parseFloat(lat), lng: parseFloat(lon), displayName: display_name };
    }
    
    async function onGeocode() {
        const addr = document.getElementById('addressInput').value.trim();
        if (!addr) {
            setResultText('Please enter an address.', true);
            return;
        }
        setResultText('🌍 Geocoding...');
        try {
            const { lat, lng, displayName } = await geocodeAddress(addr);
            marker.setLngLat([lng, lat]);
            map.flyTo({ center: [lng, lat], zoom: 15, pitch: 60 });
            setResultText(`📍 ${displayName}`);
        } catch (err) {
            setResultText(`Geocoding failed: ${err.message}`, true);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ---------- Event Binding ----------
    document.getElementById('geocodeBtn').addEventListener('click', onGeocode);
    document.getElementById('findBtn').addEventListener('click', findProjectsAtMarker);
    document.getElementById('refreshBtn').addEventListener('click', fetchAllProjects);
    
    // Address input: allow Enter key
    document.getElementById('addressInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') onGeocode();
    });
    
    // ---------- Start everything after map loads ----------
    map.on('load', () => {
        enable3DBuildings();
        fetchAllProjects();
        // Optionally geocode the default address after a short delay
        setTimeout(() => {
            const defaultAddr = document.getElementById('addressInput').value;
            if (defaultAddr) {
                geocodeAddress(defaultAddr).then(({ lat, lng }) => {
                    marker.setLngLat([lng, lat]);
                    map.flyTo({ center: [lng, lat], zoom: 13 });
                    setResultText(`Demo marker at "${defaultAddr}". Press "Find projects".`);
                }).catch(console.warn);
            }
        }, 1000);
    });
</script>
</body>
</html>
